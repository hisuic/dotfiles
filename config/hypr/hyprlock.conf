general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0, 0.35, 1
    animation = fadeIn, 1, 8, easeOutQuint
    animation = fadeOut, 1, 5, easeInOutCubic
    animation = inputFieldColors, 1, 4, easeInOutCubic
    animation = inputFieldFade, 1, 4, easeOutQuint
}

background {
    monitor =
    path = ~/walls/desktop/futuresynth2.png
    blur_size = 8
    blur_passes = 3
    brightness = 0.6
    contrast = 0.9
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# ── Time ──────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(ededed, 1.0)
    font_size = 96
    font_family = JetBrains Mono Nerd Font, Bold
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 5
    shadow_color = rgba(0, 0, 0, 0.6)
    shadow_boost = 1.2
}

# ── Date ──────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %-d')"
    color = rgba(b0b0cc, 0.85)
    font_size = 22
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgba(0, 0, 0, 0.5)
}

# ── Input field ───────────────────────────────────────
input-field {
    monitor =
    size = 320, 55
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.18
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(9090c0, 0.5)
    inner_color = rgba(10101a, 0.75)
    font_color = rgba(ededed, 1.0)
    fade_on_empty = true
    fade_timeout = 1200
    placeholder_text = <span foreground="##8888bb">  Enter password</span>
    hide_input = false
    rounding = 14
    check_color = rgba(a0e0c0, 0.9)
    fail_color = rgba(e07070, 0.9)
    fail_text = <i>Authentication failed</i>
    fail_transition = 300
    capslock_color = rgba(e0c070, 0.9)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -60
    halign = center
    valign = center
}

# ── Hint ──────────────────────────────────────────────
label {
    monitor =
    text = $USER
    color = rgba(8888aa, 0.7)
    font_size = 13
    font_family = JetBrains Mono Nerd Font
    position = 0, -130
    halign = center
    valign = center
}
